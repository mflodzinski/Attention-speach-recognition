checkpoint: 'checkpoints/final.pt'
device: "cuda"
length_multiplier: 1.05

tokenizer:
  tokenizer_file: "files/tokenizer.json"
  vocab_path: "files/vocab.txt"

data:
  sampling_rate: 16000
  n_mel_channels: 25
  hop_length: 200
  n_ftt: 400
  training_file: "files/train.csv"
  testing_file: "files/test.csv"
  max_str_len: 100
  descending_order: False
  sep: "_"
  csv_file_keys:
    duration: "duration"
    path: "audio_path"
    text: "text"

training:
  checkpoints_dir: "checkpoints"
  batch_size: 12
  optimizer: "sgd"
  epochs: 100
  optim:
    learning_rate: 0.01
    momentum: 0.9

model:
  decoder:
    emb_dim: 64
    hidden_size: 256
    n_layers: 1
    dropout: 0.1
    rnn_type: "lstm"

  encoder:
    input_size: ${data.n_mel_channels}
    n_layers: 4
    dropout: 0.1
    is_bidirectional: True
    hidden_size: 128 # half pred_net hidden_size if bidirectional
    rnn_type: "lstm"

  joint:
    input_size: 512